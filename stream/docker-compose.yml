version: '3.8'
services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    network_mode: host
    volumes:
      - ./mediamtx.yml:/mediamtx.yml
    restart: unless-stopped

  streamer:
    image: linuxserver/ffmpeg:latest
    container_name: streamer
    network_mode: host
    device_cgroup_rules:
      - 'c 81:* rmw'
    devices:
      - /dev/video0:/dev/video0
    command: >
      -f v4l2 -input_format mjpeg -video_size 640x480 -framerate 30
      -i /dev/video0 -c:v libx264 -pix_fmt yuv420p -preset ultrafast
      -tune zerolatency -b:v 1M -f rtsp rtsp://127.0.0.1:8554/cam
    restart: unless-stopped
    depends_on:
      - mediamtx
